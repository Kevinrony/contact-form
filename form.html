<!DOCTYPE html>
<html>
<head>
<title>Job Application Form</title>

<style>
body{
    font-family: Arial;
    background-color:#f5f5f5;
}

.container{
    width:400px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:8px;
}

fieldset{
    border:2px solid #007bff;
    padding:15px;
}

legend{
    color:#007bff;
    font-weight:bold;
}

input, select{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:10px;
}

button{
    padding:10px;
    margin-top:10px;
}
</style>

<script>
function validateForm(){
    let username=document.forms["myForm"]["username"].value;

    if(username==""){
        alert("Please enter your username");
        return false;
    }
}
</script>

</head>

<body>

<div class="container">

<form name="myForm" onsubmit="return validateForm()">

<fieldset>
<legend>Contact Information</legend>

<label>Username</label>
<input type="text" name="username">

<label>Email</label>
<input type="email" name="email">

<label>Telephone</label>
<input type="text" name="telephone">

</fieldset>

<br>

<fieldset>
<legend>Job Positions</legend>

<input type="checkbox"> Account Executive<br>
<input type="checkbox"> Business Development<br>
<input type="checkbox"> Inside Sales<br>
<input type="checkbox"> Sales Manager<br>
<input type="checkbox"> VP Sales<br>

</fieldset>

<br>

<label>Type of Position</label>
<select>
<option>Full Time</option>
<option>Part Time</option>
<option>Internship</option>
</select>

<br>

<label>Willing to Relocate?</label><br>
<input type="radio" name="relocate"> Yes
<input type="radio" name="relocate"> No

<br><br>

<input type="submit" value="Submit">
<input type="reset" value="Reset">

</form>

</div>

</body>
</html>
