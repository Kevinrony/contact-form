<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Application Form</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background: linear-gradient(to right, #4facfe, #00f2fe);
font-family: Arial, sans-serif;
}

.form-container{
max-width:600px;
margin:50px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

.section-title{
margin-top:20px;
font-weight:bold;
color:#0d6efd;
}
</style>

<script>
function validateForm(){
let username=document.forms["jobForm"]["username"].value;

if(username==""){
alert("Please enter your username");
return false;
}
}
</script>

</head>

<body>

<div class="container">
<div class="form-container">

<h2>Job Application Form</h2>

<form name="jobForm" onsubmit="return validateForm()">

<p class="section-title">Contact Information</p>

<div class="mb-3">
<label class="form-label">Username</label>
<input type="text" class="form-control" name="username" placeholder="Enter username">
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" placeholder="Enter email">
</div>

<div class="mb-3">
<label class="form-label">Telephone</label>
<input type="text" class="form-control" placeholder="Enter phone number">
</div>

<p class="section-title">Job Positions</p>

<div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">Account Executive</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">Business Development</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">Inside Sales</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">Sales Manager</label>
</div>

<div class="form-check mb-3">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">VP Sales</label>
</div>

<p class="section-title">Position Type</p>

<select class="form-select mb-3">
<option>Full Time</option>
<option>Part Time</option>
<option>Internship</option>
</select>

<p class="section-title">Willing to Relocate?</p>

<div class="form-check">
<input class="form-check-input" type="radio" name="relocate">
<label class="form-check-label">Yes</label>
</div>

<div class="form-check mb-3">
<input class="form-check-input" type="radio" name="relocate">
<label class="form-check-label">No</label>
</div>

<div class="d-grid gap-2">
<button type="submit" class="btn btn-primary">Submit Application</button>
<button type="reset" class="btn btn-secondary">Reset Form</button>
</div>

</form>

</div>
</div>

</body>
</html>
```
